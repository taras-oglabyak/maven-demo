name: maven-run-tests

on:
  push:
    branches:
    - main

jobs:

  echo-hello-job:
    runs-on: ubuntu-latest
    steps:
    - name: First step
      run: echo "hello"

  run-tests:
    runs-on: ubuntu-latest
    steps:
    - name: First step
      run: |
        echo date
    - name: Get code
      uses: actions/checkout@v4
    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'liberica'
        java-version: '21'
    - name: Run tests
      run: mvn test
